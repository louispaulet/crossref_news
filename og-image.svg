<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Crossref News</title>
  <desc id="desc">A dark briefing card for fraud-detection research.</desc>
  <rect width="1200" height="630" fill="#07111F"/>
  <circle cx="990" cy="120" r="220" fill="url(#g1)" opacity="0.65"/>
  <circle cx="190" cy="520" r="210" fill="url(#g2)" opacity="0.55"/>
  <rect x="86" y="86" width="1028" height="458" rx="36" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.12)"/>
  <circle cx="162" cy="166" r="36" fill="rgba(56,189,248,0.16)" stroke="rgba(125,211,252,0.55)"/>
  <path d="M145 166H179" stroke="#7DD3FC" stroke-width="6" stroke-linecap="round"/>
  <path d="M162 149V183" stroke="#7DD3FC" stroke-width="6" stroke-linecap="round"/>
  <text x="238" y="162" fill="#7DD3FC" font-family="Arial, Helvetica, sans-serif" font-size="20" letter-spacing="4">CROSSREF NEWS</text>
  <text x="126" y="270" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="700">Track newly published</text>
  <text x="126" y="350" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="700">fraud-detection research</text>
  <text x="126" y="430" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="28">Crossref metadata, executive summaries, and source records in one briefing.</text>
  <text x="126" y="490" fill="#94A3B8" font-family="Arial, Helvetica, sans-serif" font-size="22">Crossref REST API  •  Cloudflare Workers  •  GitHub Pages</text>
